name: Deploy Firebase

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "hosting/**"
      - "backend/**"
      - "firebase.json"
      - "firebase.hosting-only.json"
      - "firestore.rules"
      - "Dockerfile"
      - ".github/workflows/firebase-deploy.yml"

jobs:
  deploy-hosting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: bash scripts/prepare-hosting.sh
      - name: Deploy Hosting + Firestore
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "${FIREBASE_TOKEN}" ]; then
            echo "::warning::Repository secret FIREBASE_TOKEN 이 없습니다. Hosting 배포를 건너뜁니다."
            exit 0
          fi
          npm install -g firebase-tools
          firebase deploy --only hosting --project ssh-analyzer --config firebase.hosting-only.json --non-interactive
          firebase deploy --only firestore --project ssh-analyzer --non-interactive

  deploy-cloud-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Cloud Run API
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "${GCP_SA_KEY}" ]; then
            echo "::warning::Repository secret GCP_SA_KEY 가 없습니다. Cloud Run 배포를 건너뜁니다."
            exit 0
          fi
          echo "${GCP_SA_KEY}" > "${RUNNER_TEMP}/gcp-key.json"
          gcloud auth activate-service-account --key-file="${RUNNER_TEMP}/gcp-key.json"
          gcloud config set project ssh-analyzer
          gcloud run deploy ssh-monitor-api \
            --source . \
            --region asia-northeast3 \
            --allow-unauthenticated \
            --set-env-vars "STORAGE_BACKEND=firestore,FIREBASE_AUTH_REQUIRED=true,HISTORY_ENABLED=true" \
            --memory 512Mi \
            --timeout 120
