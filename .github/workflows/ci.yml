name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: monitor
          POSTGRES_PASSWORD: monitor
          POSTGRES_DB: monitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U monitor -d monitor"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+psycopg2://monitor:monitor@localhost:5432/monitor
      REDIS_URL: redis://localhost:6379/0
      ENCRYPTION_KEY: 2_ap7D0fHN5brVyqu_sujg-kcnryVAM4ffxHVhaeyTE=
      JWT_SECRET: ci-jwt-secret-key-for-testing-only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Ruff
        working-directory: backend
        run: ruff check app tests
      - name: Pytest
        working-directory: backend
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and build web
        working-directory: web
        run: |
          npm install
          npm run build
